title: Startseite
extends: options/base_options

columns:
  main:
    width: 2/3
    sections:
      fields:
        type: fields
        fields:
          pageSettings:
            label: Seiten Einstellungen
            type: headline

          headerImage:
            label: Header Image
            type: files
            max: 1
            layout: cards
            uploads:
              parent: page
              accept:
                extension: [jpg, jpeg, png, webp]

          headerLine:
            label: Header Linie
            type: select
            options:
              abteilung: Abteilung
              biber: Biber
              woelfe: Wölfe
              pfadis: Pfadis
              pios: Pios
              rover: Rover

          line:
            type: line

          naechsterAnlassPosition:
            label: Position "Nächster Anlass"
            type: select
            default: unten
            options:
              oben: Oben (vor dem Inhalt)
              unten: Unten (nach dem Inhalt)

          inhalt:
            label: Inhalt
            type: headline

          inhaltselemente:
            label: Inhaltselemente
            type: blocks
            pretty: true
            fieldsets:
              - one_col
              - two_col
              - three_col

  sidebar:
    width: 1/3
    sections:
      pages:
        type: pages
        label: Unterseiten
      files:
        type: files
