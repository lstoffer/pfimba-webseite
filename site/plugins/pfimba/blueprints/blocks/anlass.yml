type: anlass
title: Anlass
label: "{{ name }} ({{ datum }})"
preview: fields
wysiwyg: true
fields:
  name:
    label: Name
    type: text
    required: true
  verantwortung:
    label: Verantwortung
    type: text
  stufe:
    label: Stufen
    type: multiselect
    required: false
    options:
      abteilung: Abteilung
      biber: Biber
      woelfe: Wölfe
      pfadis: Pfadis
      pios: Pios
      rover: Rover
      elternrat: Elternrat
  mehrtaegig:
    label: Mehrtägig
    help: Aktivieren für Anlässe mit Start- und Enddatum
    type: toggle
  datum:
    label: Datum / Startdatum
    type: date
    required: true
  enddatum:
    label: Enddatum
    type: date
    required: true
    when:
      mehrtaegig: true
  link:
    label: Link
    type: link
    required: false
    options:
      - url
      - page
      - file
