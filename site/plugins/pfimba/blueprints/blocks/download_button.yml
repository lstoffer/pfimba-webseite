type: download_button
title: Download Button
label: "{{ titel }}"
preview: fields
wysiwyg: true

fields:
  titel:
    label: Titel
    type: text
    required: true

  datei:
    label: PDF Datei
    type: files
    min: 1
    max: 1
    layout: cards
    uploads:
      parent: page
      accept:
        extension: [pdf]
